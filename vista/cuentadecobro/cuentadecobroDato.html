{{define "body" }}



<script type="text/javascript"
        src="{{ .hosting }}static/js/jspanel.js"></script>
<link rel="stylesheet" href="{{ .hosting }}static/css/jspanel.css"/>
<link rel="stylesheet" href="{{ .hosting }}static/css/autocomplete.css"/>
<link rel="stylesheet" href="{{ .hosting }}static/css/ribbons.css"/>
<script src="{{ .hosting }}static/js/jquery-ui.js"></script>
<script src="{{ .hosting }}static/js/cleave.js"></script>

<link rel="stylesheet" href="{{ .hosting }}static/css/formulario.css"/>
<link rel="stylesheet" href="{{ .hosting }}static/css/cuentadecobro.css"/>


<div class="container-fluid">
    <div class="col-md-12">
        <div class="card">
            <div class="card-body">
                <a class="ribbon ribbon-top-right ribbon-amarillo ribbon-md" href="">CONTABILIZADO</a>
                <br>
                <h3 class="" style="color: white; background-color: #21B799; width: 350px; text-align: center; border-radius: 3px">Datos Cuenta de Cobro</h3>
                <div class="tab-content" id="myTabContent">
                    <div class="tab-pane fade show active" id="home"
                         role="tabpanel" aria-labelledby="home-tab">
                        <form id="formulario" method="POST"
                              action="CuentadecobroDatos">

                            <br>
                            <div class="form-group row mb-0">
                                <table id="tabla"
                                       class="table table-borderless table-striped table-sm"
                                       cellspacing="0" width="100%">
                                    <thead style="color: white;background-color: #21B799; height: 35px">
                                    <tr>
                                        <th >Tercero</th>
                                        <th >Nombre</th>
                                        <th style="padding-left: 35px">Descuento 1</th>
                                        <th  style="padding-left: 35px">Descuento 2</th>
                                        <th  style="padding-left: 62px">Cuota P</th>
                                        <th  style="padding-left: 62px">Cuota 1</th>
                                        <th  style="padding-left: 62px">Cuota 2</th>
                                        <th ></th>
                                        <th ></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                </table>
                            </div>
                            <br>
                               <div class="form-group row mb-0">
                                <div class="col-sm-12">
                                    <a href="/CuentadecobroLista"
                                       class="btn btn-outline-dark waves-effect
                                       btn-md float-right">Cancelar </a>
                                    <button type="button"
                                            onclick="guardar('Actualizar')"
                                            class="btn btn-outline-success
                                             waves-effect btn-md float-right">
                                        Guardar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!--   INICIA NUEVO TERCERO-->
<input id="TerceroNuevo"
       type="hidden"/>
<input id="CuentaNuevo"
       type="hidden"/>
<input id="CentroNuevo"
       type="hidden"/>
<script src="{{ .hosting }}static/js/cuentadecobro.js"></script>
<!--    TERMINA NUEVO TERCERO-->

<!--   INICIA TEMPLATE-->
{{template "cuentadecobroDatoscript" }}

<script>
    $(document).ready(function () {
        $('#Centro').materialSelect({});

        // llenar valores


        // llenar detalle
        cont = 1;
        {{range.cuentadecobroDato }}
        agregar();
        $('#tercero' + cont).val('{{ .Tercero }}');
        $('#nombre' + cont).val('{{ .Nombre }}');
        $('#descuento1' + cont).val('{{ .Descuento1 }}');
        $('#descuento2' + cont).val('{{ .Descuento2 }}');
        $('#cuotap' + cont).val('{{ .Cuotap }}');
        $('#cuota1' + cont).val('{{ .Cuota1 }}');
        $('#cuota2' + cont).val('{{ .Cuota2 }}');
        cont++;
        {{end}}

        totales();
    });

</script>
{{end}}
