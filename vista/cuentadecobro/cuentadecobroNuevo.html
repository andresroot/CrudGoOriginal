{{define "body" }}
<link rel="stylesheet" href="{{ .hosting }}static/css/formulario.css"/>
<link rel="stylesheet" href="{{ .hosting }}static/css/Cuentadecobro.css"/>


<script type="text/javascript"
        src="{{ .hosting }}static/js/jspanel.js"></script>
<link rel="stylesheet" href="{{ .hosting }}static/css/jspanel.css"/>
<link rel="stylesheet" href="{{ .hosting }}static/css/autocomplete.css"/>
<script src="{{ .hosting }}static/js/jquery-ui.js"></script>
<script src="{{ .hosting }}static/js/cleave.js"></script>
<div class="container-fluid">
    <div class="col-md-12">
        <!--             INICIA AVISO CODIGO YA EXISTE-->
        <div class="form-group row mb-0">
            <div class="col-sm-3">
                <div class="md-form mt-0">
                    <div id="aviso"
                         class="alert alert-success alert-dismissible"
                         role="alert">
                        <p id="textoaviso">Cargando...</p>
                        <button
                                type="button"
                                class="close"
                                data-dismiss="alert"
                                aria-label="Close">
                            <span aria-hidden="true"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!--            TERMINA AVISO CODIGO YA EXISTE-->
        <div class="card">
            <div class="card-body">
                <h3 class="" style="color: white; background-color: #21B799; width: 350px; text-align: center; border-radius: 3px">Nuevo Cuenta de Cobro</h3>
                <div class="tab-content" id="myTabContent">
                    <div class="tab-pane fade show active" id="home"
                         role="tabpanel" aria-labelledby="home-tab">
                        <form id="formulario" method="POST"
                              action="/CuentadecobroAgregar">
                            <div class="form-group row mb-0">
                                <label class="col-sm-1 col-form-label">Numero
                                    </label>
                                <div class="col-sm-1">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Numero"
                                               id="Numero"
                                               class="form-control"/>
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Fecha
                                    </label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="Date"
                                               placeholder="DD/mm/YYYY"
                                               name="Fecha"
                                               id="Fecha"
                                               class="form-control"/>
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Nit. No.</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Tercero"
                                               id="Tercero"
                                               class="form-control" />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Nombre</label>
                                <div class="col-sm-3">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Nombre"
                                               id="Nombre"
                                               class="form-control" readonly/>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group row mb-0">
                                <label class="col-sm-1 col-form-label">Direccion</label>
                                <div class="col-sm-4">
                                    <div class="md-form mt-0">
                                        <input type="Text"
                                               name="Direccion"
                                               id="Direccion"
                                               class="form-control"/>
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Codigo</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="PhCodigo"
                                               id="PhCodigo"
                                               class="form-control"/>
                                    </div>
                                </div>

                                <label class="col-sm-1 col-form-label">Centro</label>
                                <div class="col-sm-3">
                                    <div class="md-form mt-0">
                                        <select name="Centro"
                                                id="Centro"
                                                class=" mdb-select md-form-control"
                                                searchable="Buscar...">
                                            {{ range .centro }}
                                            <option value="{{ .Codigo }}">{{ .Nombre }}
                                            </option>
                                            {{ end }}
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <br>
                            <div class="form-group row mb-0">
                                <table id="tabla"
                                       class="table table-borderless table-sm"
                                       cellspacing="0" width="100%">
                                    <thead class="border black-text">
                                    <tr style="color: white;background-color: #21B799; height: 35px">
                                        <th style="color: white;background-color: #21B799; height: 35px"></th>
                                        <th ></th>
                                        <th >No</th>
                                        <th style="padding-left: 11px">Cuenta</th>
                                        <th style="padding-left: 11px">Descripcion</th>
                                        <th style="padding-left: 92px">Anterior</th>
                                        <th style="padding-left: 102px">Actual</th>
                                        <th style="padding-left: 112px">Total</th>
                                        <th ></th>
                                        <th ></th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    </tbody>
                                   <tfoot>

                                   <tr>
                                       <td></td>
                                       <td></td>
                                       <td></td>
                                       <td></td>
                                       <td ></td>
                                       <td></td>
                                       <td></td>
                                       <td></td>
                                       <td></td>
                                   </tr>

                                    <tr>
                                        <td></td>
                                        <td></td>
                                        <td><input style="width:50px"type="text"
                                                   id="Items"
                                                   class="inputItem"/></td>
                                        <td></td>
                                        <td ><p class="mt-0 text-right pt-2">Totales</p></td>
                                        <td><input style="width: 150px" type="text"
                                                   class="inputNumero" id="Totalanterior"  /></td>
                                        <td><input style="width: 150px" type="text"
                                                   class="inputNumero" id="Totalactual"  /></td>
                                        <td><input style="width: 150px" type="text"
                                                   id="Total"
                                                   class="inputNumero"/></td>
                                        <td></td>
                                    </tr>
                                    </tfoot>
                                </table>
                           </div>
                            <br>
                                 <div class="form-group row mb-0" style="margin-right: 25px">
                                 <div class="col-sm-12">
                                    <a href="/CuentadecobroLista"
                                       class="btn btn-outline-dark waves-effect
                                        btn-md float-right">Cancelar </a>
                                    <button type="button"
                                            onclick="guardar('Nuevo')"
                                            class="btn btn-outline-success
                                            waves-effect btn-md float-right">
                                        Guardar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!--   INICIA NUEVO TERCERO-->
<input id="TerceroNuevo"
       type="hidden"/>
<input id="CuentaNuevo"
       type="hidden"/>
<input id="CentroNuevo"
       type="hidden"/>
<script src="{{ .hosting }}static/js/Cuentadecobro.js"></script>
<!--    TERMINA NUEVO TERCERO-->

<!--   INICIA TEMPLATE-->
{{template "cuentadecobroscript" }}
{{template "autocompletaPlandecuentaempresa" }}
{{template "autocompletaTercero" }}

<script>
    $(document).ready(function () {
        // INICIA CREAR LINEA
        agregar();
        // TERMINA CREAR LINEA

        // INICIA FECHA
        var m = moment().format("YYYY-MM-DD");
        $("#Fecha").val(m);

        // TERMINA FECHA

        // INICIA CODIGO  YA EXISTE
        $("#Numero").focus();
        $("#aviso").hide();
        $("#guardar").prop("disabled", false);
        $("#guardar").prop("disabled", true);
        $("#Numero").keyup(function () {
            numero = $("#Numero").val().replace(" ", "_").toUpperCase();
            $("#Numero").val(numero);
            if ($("#Numero").val().length > 0) {
                console.log("Handler for .keyup() called." + $("#Numero").val());
                $.ajax({
                    url: "/CuentadecobroExiste/" + $("#Documento").val() + "/" + $("#Numero").val(),
                    type: "GET",
                    dataType: "json",
                    async: false,
                    success: function (respuesta) {
                        if (respuesta.result == true) {
                            console.log(respuesta.result);
                            $("#textoaviso").html("El Numero Ya Existe");
                            $("#aviso").show();
                            $("#guardar").prop("disabled", true);
                        } else {
                            console.log(respuesta.result);
                            $("#aviso").hide();
                            $("#guardar").prop("disabled", false);
                        }
                    },
                });
            }
        });
        // TERMINA CODIGO YA EXISTE

        // INICIA FOCUS
        $('#Numero').focus();
        // TERMINA FOCUS
        autocompletaTercero("#Tercero" , "#Nombre", "#Direccion", "#PhCodigo");
        // INICIA SELECT
        $('#Centro').materialSelect({});

        // TERMINA SELECT

    });
</script>

{{end}}
