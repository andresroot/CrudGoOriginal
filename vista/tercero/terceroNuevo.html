{{define "body" }}
<link rel="stylesheet" href="{{ .hosting }}static/css/formulario.css"/>
<script type="text/javascript"
        src="{{ .hosting }}static/js/jspanel.js"></script>
<link rel="stylesheet" href="{{ .hosting }}static/css/jspanel.css"/>
<link rel="stylesheet" href="{{ .hosting }}static/css/autocomplete.css"/>
<script src="{{ .hosting }}static/js/jquery-ui.js"></script>
<div class="container-fluid">
    <div class="col-md-12">
        <!--       INICIA AVISO CODIGO YA EXISTE-->
        <div class="form-group row mb-0">
            <div class="col-sm-3">
                <div class="md-form mt-0">
                    <div id="aviso"
                         class="alert alert-success alert-dismissible"
                         role="alert">
                        <p id="textoaviso">Cargando...</p>
                        <button
                                type="button"
                                class="close"
                                data-dismiss="alert"
                                aria-label="Close"
                        >
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!--       TERMINA AVISO CODIGO YA EXISTE-->
        <div class="card">
            <div class="card-body">
                <h3 class="" style="color: white; background-color: #21B799;
                     width: 250px; text-align: center; border-radius: 1px">Nuevo Tercero</h3>
                <br>
                <form id="formulario" method="POST"
                      action="/TerceroInsertar">
                    <div class="form-group row mb-0">
                        <label class="col-sm-1 col-form-label">Nit. No.</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text" name="Codigo"
                                       id="Codigo"
                                       class="form-control" required/>
                            </div>
                        </div>
                        <!--                        <label for="campo2" class="col-sm-1 col-form-label">Dv</label>-->
                        <div class="col-sm-1">
                            <div class="md-form mt-0">
                                <input type="text" name="Dv"
                                       id="Dv" class="form-control"
                                       readonly/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Tipo</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <select name="Tipo" id="Tipo"
                                        class="mdb-select md-form-control"
                                        editable="true">
                                    {{ range .tipoorganizacion}}
                                    <option value="{{ .Codigo }}">{{ .Nombre}}
                                    </option>
                                    {{ end }}
                                </select>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Empresa</label>
                        <div class="col-sm-4">
                            <div class="md-form mt-0">
                                <input type="text" name="Juridica"
                                       id="Juridica"
                                       class="form-control" readonly/>
                            </div>
                        </div>
                    </div>
                    <div class="form-group row mb-0">
                        <label class="col-sm-1 col-form-label">1er
                            Nombre</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text"
                                       name="PrimerNombre"
                                       id="PrimerNombre"
                                       class="form-control" required/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">2do
                            Nombre</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text"
                                       name="SegundoNombre"
                                       id="SegundoNombre"
                                       class="form-control"/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">1er
                            Apellido</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text"
                                       name="PrimerApellido"
                                       id="PrimerApellido"
                                       class="form-control" required/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">2do
                            Apellido</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text"
                                       name="SegundoApellido"
                                       id="SegundoApellido"
                                       class="form-control"/>
                            </div>
                        </div>
                    </div>
                    <div class="form-group row mb-0">
                        <label class="col-sm-1 col-form-label">Telefono</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text" name="Telefono1"
                                       id="Telefono1"
                                       class="form-control"/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Telefono</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text" name="Telefono2"
                                       id="Telefono2"
                                       class="form-control"/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Ret.
                            Ica %</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <div class="md-form mt-0">
                                    <input type="text" name="Ica"
                                           id="Ica"
                                           minlength="4"
                                           maxlength="4"
                                           class="form-control"/>
                                </div>
                            </div>
                        </div>

                        <label class="col-sm-1 col-form-label">Copia
                            Rut</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <select name="Rut" id="Rut"
                                        class=" mdb-select md-form-control"
                                        editable="true">
                                    <option value="NO">NO</option>
                                    <option value="SI">SI</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="form-group row mb-0">
                        <label class="col-sm-1 col-form-label">Direccion</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <input type="text" name="Direccion"
                                       id="Direccion"
                                       class="form-control"/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Barrio</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <input type="text" name="Barrio"
                                       id="Barrio"
                                       class="form-control"/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Ciudad</label>
                        <div class="col-sm-3">
                            <select name="Ciudad"
                                    id="Ciudad"
                                    class="mdb-select md-form-control"
                                    searchable="Buscar...">
                                {{ range .ciudad}}
                                <option value="{{ .Codigo }}">{{ .Nombre }}
                                </option>
                                {{ end }}
                            </select>
                        </div>
                    </div>
                    <div class="form-group row mb-0">
                        <label class="col-sm-1 col-form-label">E-mail</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <input type="email" name="Email1"
                                       id="Email1"
                                       class="form-control"/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">E-mail</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <input type="email" name="Email2"
                                       id="Email2"
                                       class="form-control"/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Contacto</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <input type="text" name="Contacto"
                                       id="Contacto"
                                       class="form-control"/>
                            </div>
                        </div>
                    </div>
                    <div class="form-group row mb-0">
                        <label class="col-sm-1 col-form-label">Documento</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <select name="Documento"
                                        id="Documento"
                                        class=" mdb-select md-form-control"
                                        editable="true">
                                    {{ range .documentoidentificacion}}
                                    <option value="{{ .Codigo }}">{{ .Nombre }}
                                    </option>
                                    {{ end }}
                                </select>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Regimen</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <select name="Regimen"
                                        id="Regimen"
                                        class=" mdb-select md-form-control"
                                        editable="true">
                                    {{ range .regimenfiscal}}
                                    <option value="{{ .Codigo }}">{{ .Nombre}}
                                    </option>
                                    {{ end }}
                                </select>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Fiscal</label>
                        <div class="col-sm-3">
                            <div class="md-form mt-0">
                                <select name="Fiscal"
                                        id="Fiscal"
                                        class=" mdb-select md-form-control"
                                        editable="true">
                                    {{ range .responsabilidadfiscal}}
                                    <option value="{{ .Codigo }}">{{ .Nombre }}
                                    </option>
                                    {{ end }}
                                </select>
                            </div>
                        </div>
                        <input type="hidden" name="Nombre"
                               id="Nombre" class="form-control"/>
                    </div>
                    <div class="form-group row mb-0">
                        <label class="col-sm-1 col-form-label">Codigo No.</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text" name="PhCodigo"
                                       id="PhCodigo"
                                       class="form-control"/>
                            </div>
                        </div>
                        <!--                        <label for="campo2" class="col-sm-1 col-form-label">Dv</label>-->
                        <div class="col-sm-1">
                            <div class="md-form mt-0">
                                <input type="text" name="PhDv"
                                       id="PhDv" class="form-control"
                                       readonly/>
                            </div>
                        </div>
                        <label class="col-sm-1 col-form-label">Nombre</label>
                        <div class="col-sm-2">
                            <div class="md-form mt-0">
                                <input type="text" name="PhNombre"
                                       id="PhNombre" class="form-control"
                                       readonly/>
                            </div>
                        </div>
                    </div>
                    <br>
                    <div class="form-group row mb-0">
                        <div class="col-sm-12">
                            <a onclick="window.history.go(-1); return false;"
                               class="btn btn-outline-dark waves-effect btn-md float-right">Cancelar </a>
                            <button type="submit" id="guardar"
                                    class="btn btn-outline-success waves-effect btn-md float-right">
                                Guardar
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!--INICIA CREAR NUEVO-->
<input id="TerceroNuevo"
       type="hidden"/>
<!--TERMINA CREAR NUEVO -->

<script>
    // INICIA CERRAR PANEL
    var numeroPanel = 1;

    function cerrar() {
        codigoElemento = $('#Codigo').val().replace('.', '');
        elemento = '{{ .Elemento }}';
        var myCustomData = {
            valido: true,
            codigoElemento: codigoElemento,
            elementoPanel: elemento
        }
        var event = new CustomEvent('myEvent', {detail: myCustomData})
        window.parent.document.dispatchEvent(event)
    }

    //TERMINA CERRAR PANEL

    $(document).ready(function () {
        //INICIA GUARDAR DATOS
        function guardar() {
            $("#formulario").submit();
        }

        varPanel = "{{.Panel}}";
        if (varPanel != "False") {
            $('#Codigo').val('{{ .Codigo }}');
            $("#Dv").val(calcularDigitoVerificacion($("#Codigo").val()));
            $('#formulario').submit(function () { // catch the form's submit event
                $.ajax({ // create an AJAX call...
                    data: $(this).serialize(), // get the form data
                    type: $(this).attr('method'), // GET or POST
                    url: $(this).attr('action'), // the file to call
                    success: function (response) { // on success..
                        cerrar();
                    }
                });
                return false;
            });
        }
        //TERMINA GUARDAR DATOS

        //INICIA MASCARAS
        $("#Codigo").mask('000,000,000,000', {reverse: true});
        $("#PhCodigo").mask('000,000,000,000', {reverse: true});
        $("#phDv").mask('0', {reverse: true});
        $("#Descuento1").mask('000,000,000', {reverse: true});
        $("#Descuento2").mask('000,000,000', {reverse: true});
        $("#Cuotap").mask('000,000,000', {reverse: true});
        $("#Cuota1").mask('000,000,000', {reverse: true});
        $("#Cuota2").mask('000,000,000', {reverse: true});
        $("#Cuota3").mask('000,000,000', {reverse: true});
        $("#Telefono1").mask('(000) 000-0000');
        $("#Telefono2").mask('(000) 000-0000');
        $("#Factor").mask('##.00', {reverse: true});
        $("#Area").mask('###.00', {reverse: true});
        $("#Ica").mask('##.00', {reverse: true});
        //TERMINA MASCARAS

        //INICIA AVISOS
        $("#aviso").hide();
        $("#guardar").prop("disabled", false);
        $("#guardar").prop("disabled", true);
        //TERMINA AVISOS





        //INICIA AUTOCOMPLETADO
        autocompletaTercero('#PhCodigo', '#PhDv', '#PhNombre');
        //TERMINA AUTOCOMPLETADO TERCERO

        //INICIA FOCUS
        $('#Codigo').focus();
        //TERMINA FOCUS

        //INICIA SELECT
        $('.mdb-select').materialSelect({});
        //TERMINA SELECT

        //INICIA DATOS INICIALES
        $('#Tipo').val("2");
        $('#Documento').val("31");
        $('#Regimen').val("48");
        $('#Fiscal').val("R-99-PN");
        $('#Ciudad').val("50001")
        //TERMINA DATOS INICIALES

        //DATOS TERCERO COPIAR
        if ("{{ .copiar}}"=="True")
        {
            //$('#Codigo').val(Coma("{{ .emp.Codigo}}"));
            $('#Dv').val("{{ .emp.Dv }}");
            $('#Contacto').val("{{ .emp.Contacto }}");
            $('#Rut').val("{{ .emp.Rut }}");
            $('#Tipo').val("{{ .emp.Tipo }}");
            $('#Documento').val("{{ .emp.Documento }}");
            $('#Regimen').val("{{ .emp.Regimen }}");
            $('#Fiscal').val("{{ .emp.Fiscal }}");
            $('#Ciudad').val("{{ .emp.Ciudad }}")
            $('#Juridica').val("{{ .emp.Juridica }}")
            $('#PrimerNombre').val("{{ .emp.PrimerNombre }}")
            $('#SegundoNombre').val("{{ .emp.SegundoNombre }}")
            $('#PrimerApellido').val("{{ .emp.PrimerApellido }}")
            $('#SegundoApellido').val("{{ .emp.SegundoApellido }}")
            $('#Telefono1').val("{{ .emp.Telefono1 }}")
            $('#Telefono2').val("{{ .emp.Telefono2 }}")
            $('#Ica').val("{{ .emp.Ica }}")
            $('#Direccion').val("{{ .emp.Direccion }}")
            $('#Barrio').val("{{ .emp.Barrio }}")
            $('#Email1').val("{{ .emp.Email1 }}")
            $('#Email2').val("{{ .emp.Email2 }}")
            $('#PhCodigo').val(Coma("{{ .emp.PhCodigo }}"))
            $('#PhDv').val("{{ .emp.PhDv }}")
            $('#PhNombre').val("{{ .emp.PhNombre }}")

        }





    });

    //INICIA EXISTE TERCERO
    $('#Codigo').on('keyup focusout', function (event) {
        if ($("#Codigo").val().length > 0) {
            $("#Dv").val(calcularDigitoVerificacion($("#Codigo").val()));
            console.log("Handler for .keyup() called." + $("#Codigo").val());
            valor = $("#Codigo").val().replace(/\./g, '');
            $.ajax({
                url: "/TerceroExiste/" + valor,
                type: "GET",
                dataType: "json",
                async: false,
                success: function (respuesta) {
                    if (respuesta.result == true) {
                        console.log(respuesta.result);
                        $("#textoaviso").html("El codigo Ya Existe");
                        $("#aviso").show();
                        $("#guardar").prop("disabled", true);
                    } else {
                        console.log(respuesta.result);
                        $("#aviso").hide();
                        $("#guardar").prop("disabled", false);
                    }
                },
            });
        }
    });
    //TERMINA EXISTE TERCERO

    //INICIA ELECCION TIPO
    $('#Tipo').on('change', function () {
        if (this.value == "2") {
            $("#Juridica").prop("readonly", true);

            $("#PrimerNombre").prop("readonly", false);
            $("#SegundoNombre").prop("readonly", false);
            $("#PrimerApellido").prop("readonly", false);
            $("#SegundoApellido").prop("readonly", false);
            $("#PrimerNombre").val("");
            $("#SegundoNombre").val("");
            $("#PrimerApellido").val("");
            $("#SegundoApellido").val("");
            $('#PrimerNombre').focus();
        } else {
            $("#Juridica").prop("readonly", false);
            $("#PrimerNombre").prop("readonly", true);
            $("#SegundoNombre").prop("readonly", true);
            $("#PrimerApellido").prop("readonly", true);
            $("#SegundoApellido").prop("readonly", true);
            $("#Juridica").val("");
            $('#Juridica').focus();
        }
    });
    //TERMINA ELECCION TIPO

    //INICIA DIGITO DE VERIFICACION
    function calcularDigitoVerificacion(myNit) {
        var vpri,
            x,
            y,
            z;
        // LIMPIA EL NIT
        myNit = myNit.replace(/\s/g, ""); // Espacios
        myNit = myNit.replace(/,/g, ""); // Comas
        myNit = myNit.replace(/\./g, ""); // Puntos
        myNit = myNit.replace(/-/g, ""); // Guiones
        // VALIDA NIT
        if (isNaN(myNit)) {
            console.log("El nit/cédula '" + myNit + "' no es válido(a).");
            return "";
        }
        // PROCEDIMIENTO
        vpri = new Array(16);
        z = myNit.length;
        vpri[1] = 3;
        vpri[2] = 7;
        vpri[3] = 13;
        vpri[4] = 17;
        vpri[5] = 19;
        vpri[6] = 23;
        vpri[7] = 29;
        vpri[8] = 37;
        vpri[9] = 41;
        vpri[10] = 43;
        vpri[11] = 47;
        vpri[12] = 53;
        vpri[13] = 59;
        vpri[14] = 67;
        vpri[15] = 71;
        x = 0;
        y = 0;
        for (var i = 0; i < z; i++) {
            y = (myNit.substr(i, 1));
            // console.log ( y + "x" + vpri[z-i] + ":" ) ;
            x += (y * vpri [z - i]);
            // console.log ( x ) ;
        }
        y = x % 11;
        // console.log ( y ) ;
        return (y > 1) ? 11 - y : y;
    }

    // CALCULAR
    function calcular() {
        // VERIFICAR QUE HAYA NUMERO
        let nit = document.getElementById("nit").value;
        let isNitValid = nit >>> 0 === parseFloat(nit) ? true : false; // Validate a positive integer
        // SI ES UN NUMERO SE CALCULA EL DIGITO DE VERIFICACION
        if (isNitValid) {
            let inputDigVerificacion = document.getElementById("digitoVerificacion");
            inputDigVerificacion.value = calcularDigitoVerificacion(nit);
        }
    }

    //TERMINA DIGITO DE VERIFICACION
</script>

{{template "autocompletaTercero" }}
{{end}}
