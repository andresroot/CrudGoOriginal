{{define "body" }}
<link rel="stylesheet" href="{{ .hosting }}static/css/formulario.css"/>
<div class="container-fluid">
    <div class="card">
        <div class="card-body">
            <br>
            <h3 class="" style="color: white; background-color: #21B799;
                     width: 300px; text-align: center; border-radius: 1px">Editar Documento</h3>
            <div class="tab-content" id="myTabContent">
                <div class="tab-pane fade show active" id="home"
                     role="tabpanel" aria-labelledby="home-tab">
                    <form method="POST"
                          action="/DocumentoActualizar/{{.emp.Codigo }}">
                        <div class="form-group row mb-0">
                            <label class="col-sm-1 col-form-label">Codigo</label>
                            <div class="col-sm-1">
                                <div class="md-form mt-0">
                                    <input type="text"
                                           name="Codigo"
                                           id="Codigo" maxlength="2"
                                           readonly class="form-control"/>
                                </div>
                            </div>
                            <label class="col-sm-1 col-form-label">Nombre</label>
                            <div class="col-sm-4">
                                <div class="md-form mt-0">
                                    <input type="text" id="Nombre"
                                           name="Nombre" required
                                           class="form-control"/>
                                </div>
                            </div>
                            <label
                                    class="col-sm-1 col-form-label">Consecutivo</label>
                            <div class="col-sm-2">
                                <div class="md-form mt-0">
                                    <select name="Consecutivo"
                                            id="Consecutivo"
                                            class="mdb-select md-form"
                                            editable="true">
                                        <option value="NO">NO</option>
                                        <option value="SI">SI</option>
                                    </select>
                                </div>
                            </div>
                            <label class="col-sm-1 col-form-label">Inicial</label>
                            <div class="col-sm-1">
                                <div class="md-form mt-0">
                                    <input type="text"
                                           name="Inicial"
                                           id="Inicial"
                                           class="form-control"
                                    />
                                </div>
                            </div>
                        </div>
                        <br>
                        <div class="form-group row mb-0">
                            <div class="col-sm-12">
                                <a onclick="window.history.go(-1); return false;"
                                   class="btn btn-outline-dark waves-effect btn-md float-right">Cancelar </a>
                                <button type="submit"
                                        class="btn btn-outline-success waves-effect btn-md float-right">
                                    Guardar
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function () {
        //#INICIA SELECT#
        $('.mdb-select').materialSelect({});

        //#INICIA FOCUS#
        $('#Nombre').focus();

        //INICIA DATOS INICIALES
        $('#Codigo').val("{{ .emp.Codigo}}");
        $('#Nombre').val("{{ .emp.Nombre}}");
        $('#Consecutivo').val("{{ .emp.Consecutivo}}");
        $('#Inicial').val("{{ .emp.Inicial}}");

        // INICIA CREAR DUPLICADO CON F2
        $(document).on('keyup', '#Nombre', function (e) {
            var code = e.keyCode || e.which;

            if (e.which == 113) {
                document.location.href = '/DocumentoNuevo/'+ $("#Codigo").val();
            }
        });
        // TERMINA CREAR DUPLICADO CON F2
    });

    //#INICIA ELECCION TIPO
    $('#Consecutivo').on('change', function () {

        if (this.value == "NO") {
            $("#Inicial").prop("readonly", true);
            $("#Inicial").val("");

        } else {
            $("#Inicial").prop("readonly", false);
            $('#Inicial').focus();
        }
    });
    //#TERMINA ELECCION TIPO#
</script>
{{end}}
