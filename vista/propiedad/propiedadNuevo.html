{{define "body" }}
<link rel="stylesheet" href="{{ .hosting }}static/css/formulario.css"/>
<script src="{{ .hosting }}static/js/cleave.js"></script>

<link rel="stylesheet" href="{{ .hosting }}static/css/autocomplete.css"/>
<link rel="stylesheet" href="{{ .hosting }}static/css/ribbons.css"/>
<script src="{{ .hosting }}static/js/jquery-ui.js"></script>

<div class="container-fluid">
    <div class="col-md-12">
        <div class="form-group row mb-0">
            <div class="col-sm-3">
                <div class="md-form mt-0">
                    <div id="aviso"
                         class="alert alert-success alert-dismissible"
                         role="alert">
                        <p id="textoaviso">Cargando...</p>
                        <button
                                type="button"
                                class="close"
                                data-dismiss="alert"
                                aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <h3 class="" class="" style="color: white; background-color: #21B799;
                     width: 350px; text-align: center; border-radius: 1px">Nueva Propiedad y Equipo</h3>
                <div class="tab-content" id="myTabContent">
                    <div class="tab-pane fade show active" id="home"
                         role="tabpanel" aria-labelledby="home-tab">
                        <form id="formulario" method="POST"
                              action="/PropiedadInsertar">
                            <div class="form-group row mb-0">
                                <label class="col-sm-1 col-form-label">Codigo</label>
                                <div class="col-sm-1">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Codigo"
                                               id="Codigo"
                                               class="form-control"
                                               />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Nombre</label>
                                <div class="col-sm-3">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Nombre"
                                               id="Nombre"
                                               class="form-control"
                                               />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Cuenta</label>
                                <div class="col-sm-5">
                                    <select name="Cuenta"
                                            id="Cuenta"
                                            class=" mdb-select md-form-control"
                                            searchable="Buscar...">
                                        {{ range .cuenta }}
                                        <option value="{{ .Codigo }}">{{ .Codigo }} - {{ .Nombre }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                            </div>
                            <div class="form-group row mb-0">
                                <label class="col-sm-1 col-form-label">Ubiacion</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Ubicacion"
                                               id="Ubicacion"
                                               class="form-control"
                                               />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Centro</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <select name="Centro"
                                                id="Centro"
                                                class=" mdb-select md-form-control"
                                                searchable="Buscar...">
                                            {{ range .centro }}
                                            <option value="{{ .Codigo }}">{{ .Nombre }}</option>
                                            {{ end }}
                                        </select>
                                    </div>
                                </div>

                                <label class="col-sm-1 col-form-label">Fecha</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="Date"
                                               placeholder="DD/mm/YYYY"
                                               name="Fecha"
                                               id="Fecha"
                                               class="form-control"
                                               />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Inicia</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="Date"
                                               placeholder="DD/mm/YYYY"
                                               name="Inicia"
                                               id="Inicia"
                                               class="form-control"
                                        />
                                    </div>
                                </div>
                            </div>
                            <div class="form-group row mb-0">
                                <label class="col-sm-1 col-form-label">Valor</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Valor"
                                               id="Valor"
                                               class="form-control"
                                               />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">V. Residual</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Vresidual"
                                               id="Vresidual"
                                               class="form-control"
                                               />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Meses</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Vidautil"
                                               id="Vidautil"
                                               class="form-control"
                                               />
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Total Mes</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               value="0"
                                               name="Totalmes"
                                               id="Totalmes"
                                               class="form-control"
                                               readonly/>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group row mb-0">
                                <label class="col-sm-1 col-form-label">Acumulado</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               value="0"
                                               name="Acumulado"
                                               id="Acumulado"
                                               class="form-control"
                                               readonly/>
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Saldo</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               value="0"
                                               name="Saldo"
                                               id="Saldo"
                                               class="form-control"
                                               readonly/>
                                    </div>
                                </div>
                                <label class="col-sm-1 col-form-label">Proveedor</label>
                                <div class="col-sm-2">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Tercero"
                                               id="Tercero"
                                               class="form-control text-left"/>
                                    </div>
                                </div>
<!--                                <label class="col-sm-1 col-form-label">Nombre</label>-->
                                <div class="col-sm-3">
                                    <div class="md-form mt-0">
                                        <input type="text"
                                               name="Terceronombre"
                                               id="Terceronombre"
                                               class="form-control"
                                               >
                                    </div>
                                </div>
                            </div>
                            <div class="form-group row mb-0">
                                <label class="col-sm-1 col-form-label">Cuenta Gasto</label>
                                <div class="col-sm-5">
                                    <select name="Cuentagasto"
                                            id="Cuentagasto"
                                            class=" mdb-select md-form-control"
                                            searchable="Buscar...">
                                        {{ range .cuenta }}
                                        <option value="{{ .Codigo }}">{{ .Codigo }} - {{ .Nombre }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                                <label class="col-sm-1 col-form-label">Cuenta Contra</label>
                                <div class="col-sm-5">
                                    <select name="Cuentacontra"
                                            id="Cuentacontra"
                                            class=" mdb-select md-form-control"
                                            searchable="Buscar...">
                                        {{ range .cuenta }}
                                        <option value="{{ .Codigo }}">{{ .Codigo }} - {{ .Nombre }}</option>
                                        {{ end }}
                                    </select>
                                </div>
                            </div>
                            <br>
                            <div class="form-group row mb-0">
                                <div class="col-sm-12">
                                    <a onclick="window.history.go(-1); return false;"
                                       class="btn btn-outline-dark waves-effect btn-md float-right">Cancelar </a>
                                    <button type="submit" id="guardar"
                                            class="btn btn-outline-success waves-effect btn-md float-right">
                                        Guardar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{{template "autocompletaTercero" }}
<script>
    function cerrar() {
        window.parent.cerrarPanel("", false);
    }

    $(document).ready(function () {
        $('.mdb-select').materialSelect({});

        $("#Codigo").mask('000000000');

        $("#Codigo").focus();

        // INICIA AUTOCOMPLETADO
        autocompletaTercero('#Tercero', "#Dv", "#Terceronombre");

        // INICIA FECHA
        var m = moment().format("YYYY-MM-DD");
        $("#Fecha").val(m);
        var m = moment().format("YYYY-MM-DD");
        $("#Inicia").val(m);

        // formatos de entrada
        var cleave = new Cleave('#Vidautil', {
            numeral: true,
            numeralDecimalMark: '.',
            delimiter: ',',
            numeralDecimalScale: 0
        });


        var cleave = new Cleave('#Valor', {
            numeral: true,
            numeralDecimalMark: '.',
            delimiter: ',',
            numeralDecimalScale: 0

        });

        var cleave = new Cleave('#Vresidual', {
            numeral: true,
            numeralDecimalMark: '.',
            delimiter: ',',
            numeralDecimalScale: 0

        });

        var cleave = new Cleave('#Totalmes', {
            numeral: true,
            numeralDecimalMark: '.',
            delimiter: ',',
            numeralDecimalScale: 0

        });
        $(document.body).on('focusout', '#Valor', function (e) {
           calcular();
        });

        $(document.body).on('focusout', '#Vresidual', function (e) {
            calcular();
        });

        $(document.body).on('focusout', '#Vidautil', function (e) {
            calcular();
        });

        $("#aviso").hide();
        $("#guardar").prop("disabled", false);
        $("#guardar").prop("disabled", true);
        $("#Codigo").keyup(function () {
            if ($("#Codigo").val().length > 0) {
                console.log("Handler for .keyup() called." +
                    $("#Codigo").val());
                $.ajax({
                    url: "/PropiedadExiste/" + $("#Codigo").val(),
                    type: "GET",
                    dataType: "json",
                    async: false,
                    success: function (respuesta) {
                        if (respuesta.result == true) {
                            console.log(respuesta.result);
                            $("#textoaviso").html("El codigo Ya Existe");
                            $("#aviso").show();
                            $("#guardar").prop("disabled", true);
                        } else {
                            console.log(respuesta.result);
                            $("#aviso").hide();
                            $("#guardar").prop("disabled", false);
                        }
                    },
                });
            }
        });
    });

    function formato(n) {
        // format number 1000000 to 1,234,567
        return n.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",")
    }

    function limpiarformato(cnumero) {
        //alert(cnumero);
        cnumero = cnumero.replace("$", "");
        cnumero = cnumero.replace(/,/g, '');
        return Number(cnumero)
    }
    function calcular()
    {
        valor=limpiarformato($("#Valor").val());
        valorresidual=limpiarformato($("#Vresidual").val());
        vidautil=limpiarformato($("#Vidautil").val());

        if (valor>=0 && valorresidual>=0 && vidautil>0)
        {
            valormes=(valor-valorresidual)/vidautil;
            $("#Totalmes").val(formato(valormes.toFixed(0)));
        }
        else
        {
            $("#Totalmes").val("0");
           // alert("Completar Información");
        }




    }


</script>
{{end}}
